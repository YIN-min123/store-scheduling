<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>成山农场 龙湖天街店 排班工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; padding: 12px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; font-size: 20px; margin-bottom: 14px; color: #1a1a1a; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 10px; }

    .day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .day-tab { padding: 12px 8px; border-radius: 8px; border: 1.5px solid #d9d9d9; background: #fff; cursor: pointer; font-size: 14px; transition: all 0.2s; user-select: none; flex: 1; text-align: center; min-width: 0; }
    .day-tab:hover { border-color: #4472C4; color: #4472C4; }
    .day-tab.active { background: #4472C4; color: #fff; border-color: #4472C4; }
    .day-tab.weekend.active { background: #ff7a45; border-color: #ff7a45; }
    .day-tab.weekday { flex: 1 1 18%; }
    .day-tab.weekend-tab { flex: 1 1 48%; }

    .input-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: nowrap; margin-bottom: 8px; }
    .input-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
    .input-group label { font-size: 12px; color: #888; }
    .input-group input { width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 16px; text-align: center; outline: none; transition: border 0.2s; }
    .input-group input:focus { border-color: #4472C4; }
    .type-label { font-size: 13px; font-weight: 600; padding: 8px 0 0; }

    .chart-area { position: relative; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    svg { display: block; }
    .bar { cursor: pointer; transition: opacity 0.15s, filter 0.15s; }
    .bar:hover { opacity: 0.85; filter: brightness(1.1); }
    .bar:active { opacity: 0.7; }

    #tooltip { position: absolute; display: none; background: rgba(0,0,0,0.82); color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; pointer-events: none; z-index: 10; white-space: nowrap; }

    .summary { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .summary-item { font-size: 13px; color: #666; }
    .summary-item strong { color: #333; font-size: 15px; }

    .legend { display: flex; gap: 12px; margin-top: 10px; font-size: 12px; color: #888; flex-wrap: wrap; }
    .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }

    .btn-push { display: block; width: 100%; padding: 14px 20px; border: none; border-radius: 8px; background: #4472C4; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-push:hover { opacity: 0.9; }
    .btn-push:disabled { opacity: 0.5; cursor: not-allowed; }
    .push-status { text-align: center; margin-top: 8px; font-size: 13px; color: #888; }

    .detail-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; }
    .detail-table th { background: #fafafa; padding: 8px 4px; text-align: center; border-bottom: 1.5px solid #e0e0e0; color: #666; font-weight: 600; }
    .detail-table td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #f0f0f0; }
    .detail-table tr:hover td { background: #f5f9ff; }

    @media (max-width: 600px) {
      body { padding: 8px; }
      h1 { font-size: 18px; }
      .card { padding: 12px; }
      .day-tab { padding: 10px 4px; font-size: 13px; }
      .day-tab.weekday { flex: 1 1 18%; }
      .day-tab.weekend-tab { flex: 1 1 48%; }
      .input-row { flex-wrap: nowrap; gap: 8px; }
      .input-group input { padding: 10px 8px; font-size: 15px; }
      .summary { gap: 10px; }
      .summary-item { font-size: 12px; }
      .detail-table { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>成山农场 龙湖天街店 排班工具</h1>
    <div class="card">
      <div class="card-title">选择日期与参数</div>
      <div class="day-tabs" id="dayTabs"></div>
      <div class="input-row">
        <div class="input-group">
          <label>预估日总量（单）</label>
          <input type="number" id="dailyVolume" value="224" min="1" max="2000" onchange="recalculate()">
        </div>
        <div class="input-group">
          <label>目标时效（单/人时）</label>
          <input type="number" id="targetEff" value="4.5" min="0.5" max="10" step="0.1" onchange="recalculate()">
        </div>
      </div>
      <div class="type-label" id="typeLabel" style="color:#4472C4;">工作日模式</div>
    </div>
    <div class="card">
      <div class="card-title">各时段需求人数</div>
      <div class="chart-area" id="chartArea">
        <svg id="barChart" viewBox="0 0 900 340" width="100%" height="340"></svg>
        <div id="tooltip"></div>
      </div>
      <div class="legend">
        <span><span class="legend-dot" style="background:linear-gradient(90deg,#52c41a,#faad14,#ff4d4f);"></span>需求人数色阶（绿→黄→红）</span>
      </div>
      <div class="summary" id="summary"></div>
    </div>
    <div class="card">
      <div class="card-title">时段明细表</div>
      <table class="detail-table" id="detailTable">
        <thead><tr><th>时段</th><th>占比</th><th>预估单量</th><th>需求人数</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="card">
      <button class="btn-push" id="pushBtn" onclick="pushToDingTalk()">推送需求分析到钉钉群</button>
      <div class="push-status" id="pushStatus"></div>
    </div>
  </div>
  <script>
    const WEEKDAY_RATIOS = {"7.5":0.036574,"8.0":0.012489,"8.5":0.033006,"9.0":0.043711,"9.5":0.033898,"10.0":0.044603,"10.5":0.050847,"11.0":0.042819,"11.5":0.053524,"12.0":0.039251,"12.5":0.026762,"13.0":0.03479,"13.5":0.044603,"14.0":0.024086,"14.5":0.028546,"15.0":0.029438,"15.5":0.026762,"16.0":0.02587,"16.5":0.059768,"17.0":0.049955,"17.5":0.062444,"18.0":0.046387,"18.5":0.055308,"19.0":0.054416,"19.5":0.035682,"20.0":0.00446};
    const WEEKEND_RATIOS = {"7.5":0.041359,"8.0":0.019202,"8.5":0.023634,"9.0":0.035451,"9.5":0.042836,"10.0":0.070901,"10.5":0.051699,"11.0":0.051699,"11.5":0.047267,"12.0":0.033973,"12.5":0.050222,"13.0":0.028065,"13.5":0.04579,"14.0":0.033973,"14.5":0.031019,"15.0":0.028065,"15.5":0.032496,"16.0":0.044313,"16.5":0.05613,"17.0":0.042836,"17.5":0.039882,"18.0":0.038405,"18.5":0.042836,"19.0":0.031019,"19.5":0.036928};
    const WD_DAILY_AVG = 224;
    const WE_DAILY_AVG = 338;
    const DAY_NAMES = ['周一','周二','周三','周四','周五','周六','周日'];
    const DAY_TYPES = ['weekday','weekday','weekday','weekday','weekday','weekend','weekend'];

    let selectedDay = 0;

    function init() {
      const tabs = document.getElementById('dayTabs');
      DAY_NAMES.forEach((name, i) => {
        const tab = document.createElement('div');
        tab.className = 'day-tab ' + (DAY_TYPES[i] === 'weekend' ? 'weekend' : 'weekday');
        if (DAY_TYPES[i] === 'weekend') tab.className += ' weekend-tab';
        tab.textContent = name;
        tab.onclick = () => selectDay(i);
        tabs.appendChild(tab);
      });
      selectDay(0);
    }

    function selectDay(idx) {
      selectedDay = idx;
      const tabs = document.querySelectorAll('.day-tab');
      tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
      const isWeekend = DAY_TYPES[idx] === 'weekend';
      const volInput = document.getElementById('dailyVolume');
      volInput.value = isWeekend ? WE_DAILY_AVG : WD_DAILY_AVG;
      const label = document.getElementById('typeLabel');
      label.textContent = isWeekend ? '周末模式' : '工作日模式';
      label.style.color = isWeekend ? '#ff7a45' : '#4472C4';
      recalculate();
    }

    function getRatios() {
      return DAY_TYPES[selectedDay] === 'weekend' ? WEEKEND_RATIOS : WEEKDAY_RATIOS;
    }

    function fmtTime(h) {
      const hour = Math.floor(h);
      const min = (h % 1) >= 0.5 ? '30' : '00';
      return hour + ':' + min;
    }

    function recalculate() {
      const dailyVol = parseFloat(document.getElementById('dailyVolume').value) || 0;
      const targetEff = parseFloat(document.getElementById('targetEff').value) || 4.5;
      const ratios = getRatios();
      const halfHourCap = targetEff / 2;

      const slots = Object.keys(ratios).map(k => parseFloat(k)).sort((a, b) => a - b);
      const data = slots.map(h => {
        const key = h % 1 === 0 ? h.toFixed(1) : h.toString();
        const ratio = ratios[key] || 0;
        const vol = dailyVol * ratio;
        const demand = vol / halfHourCap;
        return { h, ratio, vol, demand, key };
      });

      drawBarChart(data);
      drawTable(data);
      updateSummary(data);
    }

    function getColor(demand, maxDemand) {
      if (maxDemand === 0) return '#52c41a';
      const pct = demand / maxDemand;
      if (pct <= 0.5) {
        const t = pct / 0.5;
        const r = Math.round(82 + (250 - 82) * t);
        const g = Math.round(196 + (173 - 196) * t);
        const b = Math.round(26 + (20 - 26) * t);
        return `rgb(${r},${g},${b})`;
      } else {
        const t = (pct - 0.5) / 0.5;
        const r = Math.round(250 + (255 - 250) * t);
        const g = Math.round(173 + (77 - 173) * t);
        const b = Math.round(20 + (79 - 20) * t);
        return `rgb(${r},${g},${b})`;
      }
    }

    function drawBarChart(data) {
      const svg = document.getElementById('barChart');
      svg.innerHTML = '';
      if (data.length === 0) return;

      const margin = { top: 20, right: 20, bottom: 50, left: 50 };
      const width = 900 - margin.left - margin.right;
      const height = 340 - margin.top - margin.bottom;
      const maxDemand = Math.max(...data.map(d => d.demand), 0.1);

      const barWidth = width / data.length * 0.7;
      const gap = width / data.length * 0.3;

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('transform', `translate(${margin.left},${margin.top})`);

      // Y axis
      const yTicks = 5;
      for (let i = 0; i <= yTicks; i++) {
        const val = (maxDemand / yTicks) * i;
        const y = height - (val / maxDemand) * height;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', 0); line.setAttribute('x2', width);
        line.setAttribute('y1', y); line.setAttribute('y2', y);
        line.setAttribute('stroke', '#f0f0f0'); line.setAttribute('stroke-width', 1);
        g.appendChild(line);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', -8); text.setAttribute('y', y + 4);
        text.setAttribute('text-anchor', 'end'); text.setAttribute('font-size', '11');
        text.setAttribute('fill', '#999');
        text.textContent = val.toFixed(1);
        g.appendChild(text);
      }

      // Bars
      data.forEach((d, i) => {
        const x = i * (barWidth + gap) + gap / 2;
        const barH = (d.demand / maxDemand) * height;
        const y = height - barH;
        const color = getColor(d.demand, maxDemand);

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', x); rect.setAttribute('y', y);
        rect.setAttribute('width', barWidth); rect.setAttribute('height', barH);
        rect.setAttribute('rx', 3); rect.setAttribute('fill', color);
        rect.setAttribute('class', 'bar');
        rect.dataset.idx = i;
        rect.onclick = (e) => showTip(e, d);
        g.appendChild(rect);

        // X label
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', x + barWidth / 2); text.setAttribute('y', height + 18);
        text.setAttribute('text-anchor', 'middle'); text.setAttribute('font-size', '10');
        text.setAttribute('fill', '#999');
        text.setAttribute('transform', `rotate(-45, ${x + barWidth / 2}, ${height + 18})`);
        text.textContent = fmtTime(d.h);
        g.appendChild(text);
      });

      // Y axis label
      const yLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      yLabel.setAttribute('x', -margin.left + 10); yLabel.setAttribute('y', -8);
      yLabel.setAttribute('font-size', '12'); yLabel.setAttribute('fill', '#999');
      yLabel.textContent = '需求人数';
      g.appendChild(yLabel);

      svg.appendChild(g);

      // Click outside to hide tooltip
      svg.onclick = (e) => {
        if (!e.target.classList.contains('bar')) hideTip();
      };
    }

    function drawTable(data) {
      const tbody = document.querySelector('#detailTable tbody');
      tbody.innerHTML = '';
      data.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${fmtTime(d.h)}</td><td>${(d.ratio * 100).toFixed(1)}%</td><td>${d.vol.toFixed(0)}</td><td>${d.demand.toFixed(1)}</td>`;
        tbody.appendChild(tr);
      });
    }

    function updateSummary(data) {
      const totalPersonHalfHour = data.reduce((s, d) => s + d.demand, 0);
      const totalPersonHours = totalPersonHalfHour / 2;
      const peakSlot = data.reduce((max, d) => d.demand > max.demand ? d : max, data[0]);
      document.getElementById('summary').innerHTML = `
        <div class="summary-item">总需求人时：<strong>${totalPersonHours.toFixed(1)}</strong></div>
        <div class="summary-item">峰值时段：<strong>${fmtTime(peakSlot.h)}</strong>（${peakSlot.demand.toFixed(1)}人）</div>
      `;
    }

    function showTip(e, d) {
      const tip = document.getElementById('tooltip');
      tip.innerHTML = `<b>${fmtTime(d.h)}</b><br>占比：${(d.ratio * 100).toFixed(1)}%<br>预估单量：${d.vol.toFixed(0)}单<br>需求人数：${d.demand.toFixed(1)}人`;
      tip.style.display = 'block';
      const chartArea = document.getElementById('chartArea');
      const rect = chartArea.getBoundingClientRect();
      const x = e.clientX - rect.left + chartArea.scrollLeft + 10;
      const y = e.clientY - rect.top - 60;
      tip.style.left = Math.min(x, rect.width - 180) + 'px';
      tip.style.top = Math.max(y, 0) + 'px';
    }

    function hideTip() {
      document.getElementById('tooltip').style.display = 'none';
    }

    async function pushToDingTalk() {
      const btn = document.getElementById('pushBtn');
      const status = document.getElementById('pushStatus');
      btn.disabled = true;
      btn.textContent = '推送中...';
      status.textContent = '';

      const dailyVol = document.getElementById('dailyVolume').value;
      const targetEff = document.getElementById('targetEff').value;
      const ratios = getRatios();
      const halfHourCap = parseFloat(targetEff) / 2;
      const isWeekend = DAY_TYPES[selectedDay] === 'weekend';

      const slots = Object.keys(ratios).map(k => parseFloat(k)).sort((a, b) => a - b);
      const data = slots.map(h => {
        const key = h % 1 === 0 ? h.toFixed(1) : h.toString();
        const ratio = ratios[key] || 0;
        const vol = parseFloat(dailyVol) * ratio;
        const demand = vol / halfHourCap;
        return { h, ratio, vol, demand };
      });

      const peakSlot = data.reduce((max, d) => d.demand > max.demand ? d : max, data[0]);
      const totalPersonHours = data.reduce((s, d) => s + d.demand, 0) / 2;

      // Build analysis markdown
      let tableRows = data.filter(d => d.demand > 0.1).map(d =>
        `| ${fmtTime(d.h)} | ${(d.ratio*100).toFixed(1)}% | ${d.vol.toFixed(0)} | ${d.demand.toFixed(1)} |`
      ).join('\n');

      const analysisMd = `## 成山农场 龙湖天街店 排班分析\n\n` +
        `**${DAY_NAMES[selectedDay]}（${isWeekend ? '周末' : '工作日'}模式）**\n\n` +
        `预估日总量：**${dailyVol}单** | 目标时效：**${targetEff}单/人时**\n\n` +
        `| 时段 | 占比 | 预估单量 | 需求人数 |\n|---|---|---|---|\n${tableRows}\n\n` +
        `> 总需求：**${totalPersonHours.toFixed(1)}人时** | 峰值：**${fmtTime(peakSlot.h)}（${peakSlot.demand.toFixed(1)}人）**\n\n` +
        `[点击打开排班工具](http://30.165.100.218:8080/成山农场龙湖天街店排班工具.html)`;

      const token = 'd803a4c93c816453c94347900b1e834899ef48425f4ed7a7734920c79aa6cde6';
      const secret = 'SECc9593c3fa6d00267f2fbc297a409a56f2be2da03c51f62fffdea30413b51402d';

      try {
        const timestamp = Date.now().toString();
        const stringToSign = timestamp + '\n' + secret;
        const encoder = new TextEncoder();
        const keyData = encoder.encode(secret);
        const msgData = encoder.encode(stringToSign);
        const key = await crypto.subtle.importKey('raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        const signature = await crypto.subtle.sign('HMAC', key, msgData);
        const sign = btoa(String.fromCharCode(...new Uint8Array(signature)));

        const url = `https://oapi.dingtalk.com/robot/send?access_token=${token}&timestamp=${timestamp}&sign=${encodeURIComponent(sign)}`;

        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            msgtype: 'markdown',
            markdown: {
              title: '成山农场-龙湖天街店-排班分析',
              text: analysisMd
            }
          })
        });
        const result = await resp.json();
        if (result.errcode === 0) {
          status.textContent = '推送成功！';
          status.style.color = '#52c41a';
        } else {
          status.textContent = '推送失败：' + result.errmsg;
          status.style.color = '#ff4d4f';
        }
      } catch (err) {
        status.textContent = '推送异常：' + err.message;
        status.style.color = '#ff4d4f';
      }

      btn.disabled = false;
      btn.textContent = '推送需求分析到钉钉群';
    }

    init();
  </script>
</body>
</html>
