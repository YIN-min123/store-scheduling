<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>成山农场星旋广场店排班工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; padding: 12px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; font-size: 20px; margin-bottom: 14px; color: #1a1a1a; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 10px; }
    .day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .day-tab { padding: 12px 8px; border-radius: 8px; border: 1.5px solid #d9d9d9; background: #fff; cursor: pointer; font-size: 14px; transition: all 0.2s; user-select: none; flex: 1; text-align: center; min-width: 0; }
    .day-tab:hover { border-color: #4472C4; color: #4472C4; }
    .day-tab.active { background: #4472C4; color: #fff; border-color: #4472C4; }
    .day-tab.weekend.active { background: #ff7a45; border-color: #ff7a45; }
    .day-tab.weekday { flex: 1 1 18%; }
    .day-tab.weekend-tab { flex: 1 1 48%; }
    .input-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: nowrap; margin-bottom: 8px; }
    .input-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
    .input-group label { font-size: 12px; color: #888; }
    .input-group input { width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 16px; text-align: center; outline: none; transition: border 0.2s; }
    .input-group input:focus { border-color: #4472C4; }
    .type-label { font-size: 13px; font-weight: 600; padding: 8px 0 0; }
    .chart-area { position: relative; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    svg { display: block; }
    .bar { cursor: pointer; transition: opacity 0.15s, filter 0.15s; }
    .bar:hover { opacity: 0.85; filter: brightness(1.1); }
    .bar:active { opacity: 0.7; }
    #tooltip { position: absolute; display: none; background: rgba(0,0,0,0.82); color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; pointer-events: none; z-index: 10; white-space: nowrap; }
    .summary { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .summary-item { font-size: 13px; color: #666; }
    .summary-item strong { color: #333; font-size: 15px; }
    .legend { display: flex; gap: 12px; margin-top: 10px; font-size: 12px; color: #888; flex-wrap: wrap; }
    .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }
    .btn-push { display: block; width: 100%; padding: 14px 20px; border: none; border-radius: 8px; background: #4472C4; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-push:hover { opacity: 0.9; }
    .btn-push:disabled { opacity: 0.5; cursor: not-allowed; }
    .push-status { text-align: center; margin-top: 8px; font-size: 13px; color: #888; }
    .detail-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; }
    .detail-table th { background: #fafafa; padding: 8px 4px; text-align: center; border-bottom: 1.5px solid #e0e0e0; color: #666; font-weight: 600; }
    .detail-table td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #f0f0f0; }
    .detail-table tr:hover td { background: #f5f9ff; }
    @media (max-width: 600px) {
      body { padding: 8px; }
      h1 { font-size: 18px; }
      .card { padding: 12px; }
      .day-tab { padding: 10px 4px; font-size: 13px; }
      .day-tab.weekday { flex: 1 1 18%; }
      .day-tab.weekend-tab { flex: 1 1 48%; }
      .input-row { flex-wrap: nowrap; gap: 8px; }
      .input-group input { padding: 10px 8px; font-size: 15px; }
      .summary { gap: 10px; }
      .summary-item { font-size: 12px; }
      .detail-table { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>成山农场 星旋广场店 排班工具</h1>
    <div class="card">
      <div class="card-title">选择日期与参数</div>
      <div class="day-tabs" id="dayTabs"></div>
      <div class="input-row">
        <div class="input-group">
          <label>预估日总量（单）</label>
          <input type="number" id="dailyVolume" value="100" min="1" max="2000" onchange="recalculate()">
        </div>
        <div class="input-group">
          <label>目标时效（单/人时）</label>
          <input type="number" id="targetEff" value="4.5" min="0.5" max="10" step="0.1" onchange="recalculate()">
        </div>
      </div>
      <div class="type-label" id="typeLabel" style="color:#4472C4;">工作日模式</div>
    </div>
    <div class="card">
      <div class="card-title">各时段需求人数</div>
      <div class="chart-area" id="chartArea">
        <svg id="barChart" viewBox="0 0 900 340" width="100%" height="340"></svg>
        <div id="tooltip"></div>
      </div>
      <div class="legend">
        <span><span class="legend-dot" style="background:linear-gradient(90deg,#52c41a,#faad14,#ff4d4f);"></span>需求人数色阶（绿→黄→红）</span>
      </div>
      <div class="summary" id="summary"></div>
    </div>
    <div class="card">
      <div class="card-title">时段明细表</div>
      <table class="detail-table" id="detailTable">
        <thead><tr><th>时段</th><th>占比</th><th>预估单量</th><th>需求人数</th></tr></thead>
        <tbody></tbody>
      </table>
      <button class="btn-export" onclick="exportExcel()" style="margin-top:12px;display:block;width:100%;padding:12px 20px;border:none;border-radius:8px;background:#52c41a;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s;">导出Excel表格</button>
    </div>
    <div class="card">
      <button class="btn-push" id="pushBtn" onclick="pushToDingTalk()">推送需求分析到钉钉群</button>
      <div class="push-status" id="pushStatus"></div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    const WEEKDAY_RATIOS = {"8.5":0.041096,"9.0":0.021918,"9.5":0.03105,"10.0":0.040183,"10.5":0.040183,"11.0":0.037443,"11.5":0.048402,"12.0":0.043836,"12.5":0.03105,"13.0":0.040183,"13.5":0.022831,"14.0":0.029224,"14.5":0.03379,"15.0":0.038356,"15.5":0.03105,"16.0":0.041096,"16.5":0.042922,"17.0":0.066667,"17.5":0.063014,"18.0":0.068493,"18.5":0.055708,"19.0":0.07032,"19.5":0.055708,"20.0":0.005479};
    const WEEKEND_RATIOS = {"8.5":0.046687,"9.0":0.02259,"9.5":0.054217,"10.0":0.055723,"10.5":0.061747,"11.0":0.066265,"11.5":0.049699,"12.0":0.037651,"12.5":0.043675,"13.0":0.025602,"13.5":0.03012,"14.0":0.037651,"14.5":0.033133,"15.0":0.037651,"15.5":0.046687,"16.0":0.051205,"16.5":0.057229,"17.0":0.061747,"17.5":0.028614,"18.0":0.036145,"18.5":0.03012,"19.0":0.040663,"19.5":0.040663,"20.0":0.004518};
    const WD_DAILY_AVG = 100;
    const WE_DAILY_AVG = 166;
    const DAY_NAMES = ['周一','周二','周三','周四','周五','周六','周日'];
    const DAY_TYPES = ['weekday','weekday','weekday','weekday','weekday','weekend','weekend'];

    const WEBHOOK_TOKEN = '0bac650a77e6b26a5e8ca2512716d7dc98535086e3814c35428ca934d554ed55';
    const WEBHOOK_SECRET = 'SEC90f96c452504b95f8fbe7a08a93853b355174a53dc5268c1795049ac8a363855';

    let currentDay = 0;
    let currentRatios = WEEKDAY_RATIOS;

    function init() {
      const tabs = document.getElementById('dayTabs');
      DAY_NAMES.forEach((name, i) => {
        const tab = document.createElement('div');
        tab.className = 'day-tab ' + DAY_TYPES[i] + (DAY_TYPES[i] === 'weekend' ? ' weekend-tab' : '');
        tab.textContent = name;
        tab.onclick = () => selectDay(i);
        tabs.appendChild(tab);
      });
      selectDay(0);
    }

    function selectDay(idx) {
      currentDay = idx;
      const tabs = document.querySelectorAll('.day-tab');
      tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
      const isWeekend = DAY_TYPES[idx] === 'weekend';
      currentRatios = isWeekend ? WEEKEND_RATIOS : WEEKDAY_RATIOS;
      const label = document.getElementById('typeLabel');
      label.textContent = isWeekend ? '周末模式' : '工作日模式';
      label.style.color = isWeekend ? '#ff7a45' : '#4472C4';
      document.getElementById('dailyVolume').value = isWeekend ? WE_DAILY_AVG : WD_DAILY_AVG;
      recalculate();
    }

    function recalculate() {
      const vol = parseFloat(document.getElementById('dailyVolume').value) || 0;
      const eff = parseFloat(document.getElementById('targetEff').value) || 4.5;
      const halfEff = eff / 2;
      const data = [];
      const keys = Object.keys(currentRatios).map(Number).sort((a, b) => a - b);
      let maxDemand = 0;
      keys.forEach(k => {
        const key = k % 1 === 0 ? k.toFixed(1) : k.toString();
        const ratio = currentRatios[key] || 0;
        const demand = (vol * ratio) / halfEff;
        if (demand > maxDemand) maxDemand = demand;
        data.push({ slot: k, ratio, vol: vol * ratio, demand });
      });
      drawBarChart(data, maxDemand);
      drawTable(data, vol);
      updateSummary(data, vol, eff);
    }

    function getColor(demand, maxDemand) {
      if (maxDemand === 0) return '#52c41a';
      const pct = demand / maxDemand;
      if (pct < 0.5) {
        const t = pct / 0.5;
        const r = Math.round(82 + (250 - 82) * t);
        const g = Math.round(196 + (173 - 196) * t);
        const b = Math.round(26 + (20 - 26) * t);
        return `rgb(${r},${g},${b})`;
      } else {
        const t = (pct - 0.5) / 0.5;
        const r = Math.round(250 + (255 - 250) * t);
        const g = Math.round(173 + (77 - 173) * t);
        const b = Math.round(20 + (79 - 20) * t);
        return `rgb(${r},${g},${b})`;
      }
    }

    function formatSlot(h) {
      const hr = Math.floor(h);
      const min = (h % 1) >= 0.5 ? '30' : '00';
      return hr + ':' + min;
    }

    function drawBarChart(data, maxDemand) {
      const svg = document.getElementById('barChart');
      svg.innerHTML = '';
      if (data.length === 0) return;
      const W = 900, H = 340;
      const padL = 50, padR = 20, padT = 20, padB = 60;
      const chartW = W - padL - padR;
      const chartH = H - padT - padB;
      const barW = chartW / data.length * 0.7;
      const gap = chartW / data.length * 0.3;
      const yMax = Math.ceil(maxDemand * 1.15);

      for (let i = 0; i <= 5; i++) {
        const y = padT + chartH - (chartH * i / 5);
        const val = (yMax * i / 5).toFixed(1);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', padL); line.setAttribute('x2', W - padR);
        line.setAttribute('y1', y); line.setAttribute('y2', y);
        line.setAttribute('stroke', '#eee'); line.setAttribute('stroke-width', '1');
        svg.appendChild(line);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', padL - 8); text.setAttribute('y', y + 4);
        text.setAttribute('text-anchor', 'end'); text.setAttribute('font-size', '11');
        text.setAttribute('fill', '#999');
        text.textContent = val;
        svg.appendChild(text);
      }

      data.forEach((d, i) => {
        const x = padL + i * (barW + gap) + gap / 2;
        const barH = yMax > 0 ? (d.demand / yMax) * chartH : 0;
        const y = padT + chartH - barH;
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('class', 'bar');
        rect.setAttribute('x', x); rect.setAttribute('y', y);
        rect.setAttribute('width', barW); rect.setAttribute('height', barH);
        rect.setAttribute('rx', '3');
        rect.setAttribute('fill', getColor(d.demand, maxDemand));
        rect.onclick = (e) => showTip(e, d);
        svg.appendChild(rect);

        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', x + barW / 2); label.setAttribute('y', padT + chartH + 18);
        label.setAttribute('text-anchor', 'middle'); label.setAttribute('font-size', '10');
        label.setAttribute('fill', '#666');
        label.setAttribute('transform', `rotate(-45, ${x + barW / 2}, ${padT + chartH + 18})`);
        label.textContent = formatSlot(d.slot);
        svg.appendChild(label);
      });

      document.getElementById('chartArea').onclick = (e) => {
        if (!e.target.classList.contains('bar')) hideTip();
      };
    }

    function drawTable(data, vol) {
      const tbody = document.querySelector('#detailTable tbody');
      tbody.innerHTML = '';
      data.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${formatSlot(d.slot)}</td><td>${(d.ratio * 100).toFixed(1)}%</td><td>${d.vol.toFixed(0)}</td><td>${d.demand.toFixed(1)}</td>`;
        tbody.appendChild(tr);
      });
    }

    function updateSummary(data, vol, eff) {
      const totalDemand = data.reduce((s, d) => s + d.demand, 0);
      const peak = data.reduce((a, b) => a.demand > b.demand ? a : b);
      document.getElementById('summary').innerHTML = `
        <div class="summary-item">总需求人时: <strong>${(totalDemand / eff).toFixed(1)}</strong></div>
        <div class="summary-item">峰值时段: <strong>${formatSlot(peak.slot)} (${peak.demand.toFixed(1)}人)</strong></div>
        <div class="summary-item">预估日总量: <strong>${vol}</strong> 单</div>
      `;
    }

    function showTip(e, d) {
      const tip = document.getElementById('tooltip');
      tip.innerHTML = `<b>${formatSlot(d.slot)}</b><br>占比: ${(d.ratio * 100).toFixed(1)}%<br>预估单量: ${d.vol.toFixed(0)}<br>需求人数: ${d.demand.toFixed(1)}`;
      tip.style.display = 'block';
      const rect = document.getElementById('chartArea').getBoundingClientRect();
      tip.style.left = (e.clientX - rect.left + 10) + 'px';
      tip.style.top = (e.clientY - rect.top - 60) + 'px';
    }

    function hideTip() {
      document.getElementById('tooltip').style.display = 'none';
    }

    async function pushToDingTalk() {
      const btn = document.getElementById('pushBtn');
      const status = document.getElementById('pushStatus');
      btn.disabled = true;
      status.textContent = '推送中...';
      status.style.color = '#888';

      const vol = parseFloat(document.getElementById('dailyVolume').value) || 0;
      const eff = parseFloat(document.getElementById('targetEff').value) || 4.5;
      const halfEff = eff / 2;
      const dayType = DAY_TYPES[currentDay] === 'weekend' ? '周末' : '工作日';

      let tableRows = '';
      const keys = Object.keys(currentRatios).map(Number).sort((a, b) => a - b);
      keys.forEach(k => {
        const key = k % 1 === 0 ? k.toFixed(1) : k.toString();
        const ratio = currentRatios[key] || 0;
        const slotVol = vol * ratio;
        const demand = slotVol / halfEff;
        tableRows += `| ${formatSlot(k)} | ${(ratio * 100).toFixed(1)}% | ${slotVol.toFixed(0)} | ${demand.toFixed(1)} |\n`;
      });

      const md = `## 成山农场 星旋广场店 排班需求分析\n\n` +
        `**${DAY_NAMES[currentDay]}（${dayType}）** | 预估日总量: ${vol}单 | 目标时效: ${eff}单/人时\n\n` +
        `| 时段 | 占比 | 预估单量 | 需求人数 |\n|---|---|---|---|\n` + tableRows +
        `\n> 使用排班工具可交互调整参数: [点击打开排班工具](https://yin-min123.github.io/store-scheduling/%E6%88%90%E5%B1%B1%E5%86%9C%E5%9C%BA%E6%98%9F%E6%97%8B%E5%B9%BF%E5%9C%BA%E5%BA%97%E6%8E%92%E7%8F%AD%E5%B7%A5%E5%85%B7.html)\n`;

      try {
        const timestamp = Date.now().toString();
        const encoder = new TextEncoder();
        const keyData = encoder.encode(WEBHOOK_SECRET);
        const msgData = encoder.encode(timestamp + '\n' + WEBHOOK_SECRET);
        const cryptoKey = await crypto.subtle.importKey('raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        const signature = await crypto.subtle.sign('HMAC', cryptoKey, msgData);
        const sign = btoa(String.fromCharCode(...new Uint8Array(signature)));
        const url = `https://oapi.dingtalk.com/robot/send?access_token=${WEBHOOK_TOKEN}&timestamp=${timestamp}&sign=${encodeURIComponent(sign)}`;

        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ msgtype: 'markdown', markdown: { title: '成山农场-星旋广场店-排班工具', text: md } })
        });
        const result = await resp.json();
        if (result.errcode === 0) {
          status.textContent = '推送成功!';
          status.style.color = '#52c41a';
        } else {
          status.textContent = '推送失败: ' + result.errmsg;
          status.style.color = '#ff4d4f';
        }
      } catch (err) {
        status.textContent = '推送异常: ' + err.message;
        status.style.color = '#ff4d4f';
      }
      btn.disabled = false;
    }

    function exportExcel() {
      const vol = parseFloat(document.getElementById('dailyVolume').value) || 0;
      const eff = parseFloat(document.getElementById('targetEff').value) || 4.5;
      const halfEff = eff / 2;
      const dayType = DAY_TYPES[currentDay] === 'weekend' ? '周末' : '工作日';
      const dateStr = DAY_NAMES[currentDay] + '（' + dayType + '）';

      const rows = [['成山农场 星旋广场店 排班需求分析'], ['日期：' + dateStr, '预估日总量：' + vol + '单', '目标时效：' + eff + '单/人时'], []];
      rows.push(['时段', '占比', '预估单量', '需求人数']);

      const keys = Object.keys(currentRatios).map(Number).sort((a, b) => a - b);
      let totalVol = 0, totalDemand = 0;
      keys.forEach(k => {
        const key = k % 1 === 0 ? k.toFixed(1) : k.toString();
        const ratio = currentRatios[key] || 0;
        const slotVol = vol * ratio;
        const demand = slotVol / halfEff;
        totalVol += slotVol;
        totalDemand += demand;
        rows.push([formatSlot(k), (ratio * 100).toFixed(1) + '%', Math.round(slotVol), parseFloat(demand.toFixed(1))]);
      });
      rows.push([]);
      rows.push(['合计', '100%', Math.round(totalVol), parseFloat(totalDemand.toFixed(1))]);
      rows.push([]);
      rows.push(['总需求人时', parseFloat((totalDemand / eff).toFixed(1))]);

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{ wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 12 }];
      XLSX.utils.book_append_sheet(wb, ws, '排班明细');

      const fileName = '成山农场星旋广场店_排班明细_' + DAY_NAMES[currentDay] + '.xlsx';
      XLSX.writeFile(wb, fileName);
    }

    init();
  </script>
</body>
</html>
